<nav class="navbar">
  <div class="navbar-container">
    <a routerLink="/" class="navbar-brand" (click)="closeMenu()">
      <span class="brand-icon">🎫</span>
      <span class="brand-name">Ticketera</span>
    </a>

    <button class="menu-toggle" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen" aria-label="Toggle menu">
      <span class="hamburger" [class.open]="menuOpen"></span>
    </button>

    <div class="navbar-links" [class.open]="menuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Inicio</a>
      <a routerLink="/eventos" routerLinkActive="active" (click)="closeMenu()">Eventos</a>
      <a routerLink="/carrito" routerLinkActive="active" class="cart-link" (click)="closeMenu()">
        🛒 Carrito
        @if (cartService.totalItems() > 0) {
          <span class="cart-badge">{{ cartService.totalItems() }}</span>
        }
      </a>
    </div>
  </div>
</nav>
